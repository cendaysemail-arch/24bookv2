<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>ATC24 Flightplan Clearance Book</title>

<!-- PWA SUPPORT -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#991b1b">

<style>
body{margin:0;background:#0d1117;color:#fff;font-family:Segoe UI}
#wrap{display:flex;height:100vh}
#side{width:280px;background:#111827;border-right:2px solid #991b1b;padding:12px;overflow:auto}
#main{flex:1;padding:20px;overflow:auto}
h2,h1{margin:6px 0}
.flight{padding:8px;border:1px solid #444;border-radius:6px;margin:6px 0;cursor:pointer}
.flight:hover{background:#222}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.full{grid-column:1/3}
label{color:#f87171;font-weight:bold}
input,select,textarea{
width:100%;box-sizing:border-box;background:#1f2937;color:#fff;
border:1px solid #444;padding:8px;border-radius:5px
}
button{
background:#b91c1c;color:#fff;border:none;padding:8px 12px;
border-radius:5px;margin:4px;cursor:pointer
}

/* small app feel */
body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(circle at top,#1f2937,transparent);
pointer-events:none;
opacity:0.3;
}
</style>
</head>

<body>
<div id="wrap">

<div id="side">
<h2>📚 Flight History</h2>
<button onclick="newFlight()">+ New Flight</button>
<div id="list"></div>
</div>

<div id="main">
<h1>ATC24 Flightplan Clearance Book</h1>

<div>Zulu: <span id="z"></span> | Local: <span id="l"></span></div>

<div class="grid">
<div><label>Callsign</label><input id="callsign"></div>
<div><label>Aircraft</label><input id="aircraft"></div>

<div><label>Rules</label>
<select id="rules">
<option>IFR</option>
<option>VFR</option>
</select></div>

<div><label>FL</label><input id="fl"></div>
<div><label>Departure</label><input id="dep"></div>
<div><label>Arrival</label><input id="arr"></div>

<div class="full"><label>Route</label><input id="route"></div>

<div><label>Runway</label><input id="runway"></div>
<div><label>Squawk</label><input id="squawk"></div>
<div><label>Freq</label><input id="freq"></div>
<div><label>ATIS</label><input id="atis"></div>

<div class="full"><label>Remarks</label>
<textarea id="remarks" rows="5"></textarea></div>
</div>

<button onclick="save()">💾 Save</button>
<button onclick="del()">🗑 Delete</button>
<button onclick="window.print()">🖨 Print</button>
</div>

</div>

<script>
let current=-1;

function tick(){
let d=new Date();
z.textContent=d.toUTCString().split(" ")[4]+" UTC";
l.textContent=d.toLocaleTimeString();
}
setInterval(tick,1000); tick();

function flights(){
return JSON.parse(localStorage.atc24flights||"[]")
}

function setf(a){
localStorage.atc24flights=JSON.stringify(a)
}

function form(){
let o={};
document.querySelectorAll("input,select,textarea")
.forEach(e=>o[e.id]=e.value);
return o
}

function loadForm(o){
document.querySelectorAll("input,select,textarea")
.forEach(e=>e.value=o[e.id]||"");
}

function refresh(){
list.innerHTML="";
flights().forEach((f,i)=>{
let d=document.createElement("div");
d.className="flight";
d.innerHTML="<b>"+(f.callsign||"Untitled")+"</b><br>"+(f.dep||"???")+" → "+(f.arr||"???");
d.onclick=()=>{current=i;loadForm(f)};
list.appendChild(d);
});
}

function newFlight(){
current=-1;
loadForm({rules:"IFR"});
}

function save(){
let a=flights();
if(current==-1){
a.push(form());
current=a.length-1;
}else a[current]=form();
setf(a);
refresh();
}

function del(){
if(current==-1)return;
let a=flights();
a.splice(current,1);
setf(a);
current=-1;
newFlight();
refresh();
}

refresh();
newFlight();
</script>

</body>
</html>
